<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign-up-page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="styles1.css">
</head>
<body>
    <div class="container">
        <div class="sign-up-form">
            <form>
            <h1>Create Account</h1>
            <div class="icons">
                <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="icon"><i class="fa-brands fa-linkedin"></i></a>
            </div>
            <span>or use your email for registeration</span>
            <input type="text" placeholder="Name" id="name">
            <input type="email" placeholder="Email" id="email">
            <input type="password" placeholder="Password" id="password">
            <button id="btn-1">Sign Up</button>
        </form>
    </div>
    <div class="sign-in-form">
        <form>
        <h1>Sign In</h1>
        <div class="icons">
                <a href="" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                <a href="" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="" class="icon"><i class="fa-brands fa-github"></i></a>
                <a href="" class="icon"><i class="fa-brands fa-linkedin"></i></a>
        </div>
        <span>or use your password</span>
        <input type="text" placeholder="Name" id="name-sign-in">
        <input type="email" placeholder="Email" id="email-sign-in">
        <input type="password" placeholder="Password" id="password-sign-in">
        <button id="btn-2">Sign In</button>
    </form>
</div>
<div class="toggle-container">
    <div class="toggle">
        <div class="toggle-panel toggle-left">
            <h1>Welcome Back!</h1>
            <p>Enter your personal details to use all of site features</p>
            <button class="hidden" id="login">Sign In</button>
        </div>
        <div class="toggle-panel toggle-right">
            <h1>Hello, User!</h1>
            <p>Don't have an account register now!</p>
            <button class="hidden" id="register">Sign Up</button>
        </div>
    </div>
</div>
</div>

   <script src="script.js"></script>
</body>
</html>
